/* ============================================================
   PADDLE STACK OPEN PLAY ENGINE
   ------------------------------------------------------------
   Implements the classic pickleball "paddle stack" rotation:
   - One shared queue across all courts (W×4 / L×4 alternating blocks)
   - Next 4 from front of queue fill the next available court
   - After match: 2 winners → back of next W block, 2 losers → back of next L block
   - When a W or L block hits 4 → flush entire block to the shared queue
   - Leftover (< 4) players sit at the front of their respective next block
   - First round: roster order, tagged 🆕 New
   - Match card shows: 🏆 Winners vs Winners / 💀 Losers vs Losers / 🆕 New vs New
   ============================================================ */

// Arrange a pool of players into the Paddle Stack starting order so that
// consecutive pairs (which psFillCourts() takes as teammates — see the
// [p1,p2]/[p3,p4] split below) are mixed-gender (Male+Female) partnerships
// wherever the male/female counts allow it. If the counts aren't equal,
// as many mixed pairs are formed as possible (min(males, females)) and the
// leftover players — plus anyone with no gender set — are paired up among
// themselves. Players with no gender set are treated as flexible and never
// block a possible mixed pairing.
// Gender-based pairing itself is controlled by the "Male/Female Generation"
// on/off switch in Paddle Stack Setup (state.settings.psMixedGenderPairing).
// When it's off, players are simply paired up in pool order (still honoring
// Fixed Duos first) without regard to gender.
function psBuildMixedGenderOrder(pool, randomize) {
  // Fixed Duo pairs take priority over gender-based pairing — pull them out
  // as forced pairs first, so partners always start out adjacent in the
  // queue (and therefore always land on the same team, never split up).
  const remaining = pool.slice();
  const duoPairs = [];
  (state.fixedDuos || []).forEach(([id1, id2]) => {
    const i1 = remaining.findIndex(p => p.id === id1);
    const i2 = remaining.findIndex(p => p.id === id2);
    if (i1 !== -1 && i2 !== -1) {
      const pair = [remaining[i1], remaining[i2]];
      [i1, i2].sort((a, b) => b - a).forEach(idx => remaining.splice(idx, 1));
      duoPairs.push(pair);
    }
  });

  const genderPairingOn = state.settings.psMixedGenderPairing !== false;
  let pairs = [];

  if (genderPairingOn) {
    const males = remaining.filter(p => p.gender === 'M');
    const females = remaining.filter(p => p.gender === 'F');
    const others = remaining.filter(p => p.gender !== 'M' && p.gender !== 'F');
    if (randomize) { shuffleArray(males); shuffleArray(females); shuffleArray(others); }

    const mixedCount = Math.min(males.length, females.length);
    for (let i = 0; i < mixedCount; i++) pairs.push([males[i], females[i]]);

    // Whichever gender had the surplus, plus everyone with no gender set,
    // gets paired up together — there's no opposite-gender partner left to give them.
    const leftover = males.slice(mixedCount).concat(females.slice(mixedCount)).concat(others);
    if (randomize) shuffleArray(leftover);
    for (let i = 0; i < leftover.length; i += 2) {
      pairs.push(leftover[i + 1] ? [leftover[i], leftover[i + 1]] : [leftover[i]]);
    }
  } else {
    // Gender pairing switched off — pair up remaining players in pool order
    // (or shuffled order when randomize is on), ignoring gender entirely.
    const rest = remaining.slice();
    if (randomize) shuffleArray(rest);
    for (let i = 0; i < rest.length; i += 2) {
      pairs.push(rest[i + 1] ? [rest[i], rest[i + 1]] : [rest[i]]);
    }
  }

  const allPairs = duoPairs.concat(pairs);
  if (randomize) shuffleArray(allPairs);
  const ordered = [];
  allPairs.forEach(pair => pair.forEach(p => ordered.push(p)));
  return ordered;
}

function psInit() {
  // Build initial queue from active roster — randomized by default so the
  // first generation doesn't just replay whoever was added to the roster
  // first. Organizer can turn this off in setup to use roster/check-in order.
  const pool = activePlayers().slice();
  if (pool.length < 4) { goToAddPlayer('Add a few more players to start — you need at least 4.'); return false; }
  const randomize = state.settings.psRandomizeStart !== false;
  // Order the pool in partner-pairs, favoring mixed male/female pairs — see
  // psBuildMixedGenderOrder() above. When randomize is off, males/females/
  // others each keep roster order and only the leftover pairing falls back
  // to roster order too, so setup stays deterministic either way.
  const orderedPool = psBuildMixedGenderOrder(pool, randomize);

  // Initial queue: groups of 4 (2 consecutive partner-pairs each), all tagged 'N' (new)
  const queue = orderedPool.map(p => ({ id: p.id, tag: 'N', sinceRound: 0 }));

  state.paddleStack = {
    queue,          // [{id, tag:'W'|'L'|'N', sinceRound}] — front is index 0
    wBlock: [],     // accumulating winners (< blockSize) — will flush when full
    lBlock: [],     // accumulating losers (< blockSize) — will flush when full
    courts: [],     // active court matches [{id, courtNum, teamA, teamB, tags, ...scoring}]
    numCourts: clamp(parseInt(state.settings.numCourts, 10) || 1, 1, 10),
    winningScore: state.settings.winningScore || 11,
    blockSize: clamp(parseInt(state.settings.psBlockSize, 10) || 4, 2, 8),
    sessionMatchIds: [],   // ids of matches recorded this PS session, for the end-of-session summary
    matchDurations: [],    // ms per completed match this session, for wait-time estimates
    actionHistory: []      // small PS-specific undo stack (separate from the single global state.undo)
  };
  // Fill courts from the queue
  psFillCourts();
  saveAll();
  return true;
}

// Pull the next 4 entries off the front of the queue for a new match —
// but never split a Fixed Duo across two different matches, or across
// opposing teams within the same match. Scans the queue front-to-back,
// grouping each player with their duo partner (wherever that partner
// currently sits) into a single 2-player "unit"; unpaired players are
// 1-player units. Units are taken in queue order until 4 players are
// collected. If a duo-unit won't fit in the one remaining slot, it's left
// in the queue (never broken up) and the scan keeps looking for a solo
// player to fill that last spot instead. Returns null if 4 players can't
// be assembled without splitting a duo.
function psPullNextFour(ps) {
  const queue = ps.queue;
  const n = queue.length;
  const consumed = new Set();
  const units = [];
  for (let i = 0; i < n; i++) {
    if (consumed.has(i)) continue;
    const entry = queue[i];
    const partnerId = getFixedDuoPartner(entry.id);
    const partnerIdx = partnerId
      ? queue.findIndex((e, idx) => idx > i && e.id === partnerId && !consumed.has(idx))
      : -1;
    if (partnerIdx !== -1) {
      units.push({ indices: [i, partnerIdx], size: 2 });
      consumed.add(i); consumed.add(partnerIdx);
    } else {
      units.push({ indices: [i], size: 1 });
      consumed.add(i);
    }
  }

  let total = 0;
  const selected = [];
  for (const u of units) {
    if (total === 4) break;
    if (u.size <= 4 - total) {
      selected.push(...u.indices);
      total += u.size;
    }
    // else: this duo doesn't fit the one remaining slot — leave it intact
    // in the queue and keep scanning for a solo player instead.
  }
  if (total < 4) return null;

  selected.sort((a, b) => a - b);
  const rawFour = selected.map(idx => queue[idx]);
  // Reorder so any duo pair lands adjacent (teammates), not split across
  // opposing sides — same helper Round Robin uses for the same purpose.
  const four = honorFixedDuosInFour(rawFour) || rawFour;

  // Remove the pulled entries from the queue, highest index first so
  // earlier indices stay valid while splicing.
  selected.sort((a, b) => b - a).forEach(idx => queue.splice(idx, 1));
  return four;
}

// Pull next 4 from queue and start a match on an available court
function psFillCourts() {
  const ps = state.paddleStack;
  if (!ps) return;
  if (!Array.isArray(ps.sessionMatchIds)) ps.sessionMatchIds = [];
  if (!Array.isArray(ps.matchDurations)) ps.matchDurations = [];
  if (!ps.blockSize) ps.blockSize = 4;
  // Defensive: drop anyone who went inactive (Gone Home / Tired / Injured /
  // Can't Play) but is still sitting in the queue, so they never get pulled
  // onto a court after saying they're done.
  ps.queue = ps.queue.filter(e => {
    const pl = getPlayer(e.id);
    return pl && pl.active && (pl.condition || 'ok') === 'ok';
  });
  ps.wBlock = ps.wBlock.filter(e => {
    const pl = getPlayer(e.id);
    return pl && pl.active && (pl.condition || 'ok') === 'ok';
  });
  ps.lBlock = ps.lBlock.filter(e => {
    const pl = getPlayer(e.id);
    return pl && pl.active && (pl.condition || 'ok') === 'ok';
  });
  const beforeFrontIds = new Set(ps.queue.slice(0, 4).map(e => e.id));
  const maxCourts = ps.numCourts;
  while (ps.courts.length < maxCourts && ps.queue.length >= 4) {
    const slot = psPullNextFour(ps);
    if (!slot) break; // couldn't assemble 4 without splitting a fixed duo further than possible
    const courtNum = ps.courts.length + 1;
    const [p1, p2, p3, p4] = slot;
    const matchType = psMatchType([p1, p2], [p3, p4]);
    ps.courts.push({
      id: uid('ps'),
      courtNum,
      teamA: [p1.id, p2.id],
      teamB: [p3.id, p4.id],
      tagsA: [p1.tag, p2.tag],
      tagsB: [p3.tag, p4.tag],
      matchType,
      scoreA: null, scoreB: null,
      winner: null,
      serving: 'A', serverNum: 1, firstServe: true,
      _serveUndoStack: [],
      raceActive: false, raceOffered: false,
      status: 'active',
      createdAt: Date.now()
    });
  }
  // "You're up" notice — tell anyone who newly landed in the front-of-queue
  // group (but wasn't just pulled onto a court) to get ready.
  const newlyUp = ps.queue.slice(0, 4)
    .filter(e => !beforeFrontIds.has(e.id))
    .map(e => getPlayer(e.id))
    .filter(Boolean);
  if (newlyUp.length) {
    const names = newlyUp.map(p => p.name).join(', ');
    toast(`🏓 You're up next: ${names}`, 'info');
  }
}

// Determine the label for a match based on team tags
function psMatchType(teamA, teamB) {
  // Each item is {id, tag}
  const tagsA = teamA.map(p => p.tag);
  const tagsB = teamB.map(p => p.tag);
  const dominantTag = tags => {
    if (tags.every(t => t === 'W')) return 'W';
    if (tags.every(t => t === 'L')) return 'L';
    if (tags.every(t => t === 'N')) return 'N';
    // mixed — use majority
    const wc = tags.filter(t => t === 'W').length;
    const lc = tags.filter(t => t === 'L').length;
    if (wc >= lc) return 'W'; else return 'L';
  };
  const dA = dominantTag(tagsA), dB = dominantTag(tagsB);
  if (dA === 'W' && dB === 'W') return 'WW';
  if (dA === 'L' && dB === 'L') return 'LL';
  if (dA === 'N' && dB === 'N') return 'NN';
  return 'MX'; // mixed
}

function psMatchTypeLabel(type) {
  if (type === 'WW') return '🏆 Winners vs Winners';
  if (type === 'LL') return '💀 Losers vs Losers';
  if (type === 'NN') return '🆕 New vs New';
  return '🎾 Mixed';
}

// After confirming a court result: route winners/losers to blocks
function psHandleResult(courtId, winnerTeam) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  const blockSize = ps.blockSize || 4;

  const winners = winnerTeam === 'A'
    ? m.teamA.map((id, i) => ({ id, tag: 'W' }))
    : m.teamB.map((id, i) => ({ id, tag: 'W' }));
  const losers = winnerTeam === 'A'
    ? m.teamB.map((id, i) => ({ id, tag: 'L' }))
    : m.teamA.map((id, i) => ({ id, tag: 'L' }));

  ps.wBlock.push(...winners);
  ps.lBlock.push(...losers);

  // When a block reaches blockSize, flush it to the queue.
  // Blocks alternate W/L in the queue: we always flush both when they're ready,
  // but if only one is ready we still flush it immediately so no court sits empty.
  // The "alternating W×N / L×N" pattern emerges naturally as blocks fill up.
  if (ps.wBlock.length >= blockSize) {
    const flushed = ps.wBlock.splice(0, blockSize);
    flushed.forEach(e => e.sinceRound = state.round);
    ps.queue.push(...flushed);
  }
  if (ps.lBlock.length >= blockSize) {
    const flushed = ps.lBlock.splice(0, blockSize);
    flushed.forEach(e => e.sinceRound = state.round);
    ps.queue.push(...flushed);
  }

  // ── Small-group fallback ────────────────────────────────────────────────
  // Only merge partial W/L blocks when the total player count makes it
  // impossible for either block to EVER reach blockSize on its own.
  // With enough players for the normal rotation to work, it's preserved.
  // With too few players neither block will ever fill, so we combine
  // whatever is ready (≥ blockSize combined) so the session doesn't stall.
  const activePlCount = activePlayers().length;
  const combinedBlocks = ps.wBlock.length + ps.lBlock.length;
  if (
    activePlCount < blockSize * 2 &&  // session is genuinely small — normal rotation impossible
    combinedBlocks >= blockSize &&    // enough combined players for a match
    ps.wBlock.length < blockSize &&   // neither block is full on its own
    ps.lBlock.length < blockSize
  ) {
    // Flush winners first, then losers — labelled 🎾 Mixed on the match card
    const flushedW = ps.wBlock.splice(0);
    const flushedL = ps.lBlock.splice(0);
    flushedW.forEach(e => e.sinceRound = state.round);
    flushedL.forEach(e => e.sinceRound = state.round);
    ps.queue.push(...flushedW, ...flushedL);
  }
}

// Push a snapshot of the queue/blocks/courts onto a small PS-only undo
// history (separate from the single global state.undo), capped at 5 steps.
function psPushHistory() {
  const ps = state.paddleStack;
  if (!ps) return;
  if (!Array.isArray(ps.actionHistory)) ps.actionHistory = [];
  ps.actionHistory.push(deepClone({ queue: ps.queue, wBlock: ps.wBlock, lBlock: ps.lBlock, courts: ps.courts }));
  if (ps.actionHistory.length > 5) ps.actionHistory.shift();
}

// Pop the most recent PS snapshot and restore it.
function psUndoLast() {
  const ps = state.paddleStack;
  if (!ps || !Array.isArray(ps.actionHistory) || !ps.actionHistory.length) {
    toast('Nothing to undo.', 'warning');
    return;
  }
  const snap = ps.actionHistory.pop();
  ps.queue = snap.queue;
  ps.wBlock = snap.wBlock;
  ps.lBlock = snap.lBlock;
  ps.courts = snap.courts;
  saveAll(); renderAll();
  toast('Reverted to previous state.', 'success');
}

// Confirm a paddle stack match result
function psConfirmMatch(courtId) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  if (m.winner === null) { toast('Select the winning team before confirming.', 'warning'); return; }

  // Save undo snapshot
  state.undo = {
    players: deepClone(state.players),
    matches: deepClone(state.matches),
    current: null,
    currentGeneration: null,
    rotationCourts: [],
    round: state.round,
    sitOutQueue: deepClone(state.sitOutQueue || []),
    paddleStack: deepClone(ps)
  };

  const sA = parseInt(m.scoreA, 10) || 0;
  const sB = parseInt(m.scoreB, 10) || 0;
  const tA_win = m.winner === 'A';
  state.round++;

  const matchRecord = {
    id: uid('m'),
    round: state.round,
    court: m.courtNum,
    teamA: m.teamA, teamB: m.teamB,
    scoreA: sA, scoreB: sB,
    winners: tA_win ? [...m.teamA] : [...m.teamB],
    losers: tA_win ? [...m.teamB] : [...m.teamA],
    date: new Date().toISOString()
  };
  state.matches.push(matchRecord);

  // Update stats
  [...m.teamA, ...m.teamB].forEach(id => {
    const p = getPlayer(id);
    if (!p) return;
    p.gamesPlayed++;
    if (matchRecord.winners.includes(id)) {
      p.wins++; p.results.push('W');
      p.currentStreak = p.currentStreak > 0 ? p.currentStreak + 1 : 1;
    } else {
      p.losses++; p.results.push('L');
      p.currentStreak = p.currentStreak < 0 ? p.currentStreak - 1 : -1;
    }
    if (Math.abs(p.currentStreak) > p.longestStreak) p.longestStreak = Math.abs(p.currentStreak);
  });

  // Teammate/opponent tracking
  [[m.teamA[0], m.teamA[1]], [m.teamB[0], m.teamB[1]]].forEach(([p1, p2]) => {
    const pl1 = getPlayer(p1), pl2 = getPlayer(p2);
    if (pl1 && pl2) { bumpPair(pl1.teammates, p2); bumpPair(pl2.teammates, p1); }
  });
  m.teamA.forEach(idA => m.teamB.forEach(idB => {
    const plA = getPlayer(idA), plB = getPlayer(idB);
    if (plA && plB) { bumpPair(plA.opponents, idB); bumpPair(plB.opponents, idA); }
  }));

  // ELO
  const rA = (getPlayer(m.teamA[0])?.rating||1000) + (getPlayer(m.teamA[1])?.rating||1000);
  const rB = (getPlayer(m.teamB[0])?.rating||1000) + (getPlayer(m.teamB[1])?.rating||1000);
  const expA = 1 / (1 + Math.pow(10, (rB - rA) / 400));
  const change = Math.round(32 * ((tA_win ? 1 : 0) - expA));
  m.teamA.forEach(id => { const p = getPlayer(id); if (p) p.rating += change; });
  m.teamB.forEach(id => { const p = getPlayer(id); if (p) p.rating -= change; });

  // Route to blocks
  psHandleResult(courtId, m.winner);

  // Track match duration (for queue wait-time estimates) and session match ids
  // (for the end-of-session summary) — both scoped to this PS session only.
  if (!Array.isArray(ps.matchDurations)) ps.matchDurations = [];
  if (!Array.isArray(ps.sessionMatchIds)) ps.sessionMatchIds = [];
  if (m.createdAt) {
    ps.matchDurations.push(Date.now() - m.createdAt);
    if (ps.matchDurations.length > 20) ps.matchDurations.shift(); // rolling window
  }
  ps.sessionMatchIds.push(matchRecord.id);

  // Remove finished court
  ps.courts = ps.courts.filter(c => c.id !== courtId);

  // Renumber courts
  ps.courts.forEach((c, i) => { c.courtNum = i + 1; });

  // Fill courts from queue
  psFillCourts();

  playGameWinSound();
  saveAll(); renderAll();
  toast('Match recorded — next match is up.', 'success');
}

// Skip a paddle stack court match (no result recorded)
function psSkipMatch(courtId) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  psPushHistory();
  // Return their slots to front of queue with same tags, keeping whatever
  // wait clock they already had (falls back to now for older sessions).
  const returned = [
    ...m.teamA.map((id, i) => ({ id, tag: m.tagsA[i] || 'N', sinceRound: state.round })),
    ...m.teamB.map((id, i) => ({ id, tag: m.tagsB[i] || 'N', sinceRound: state.round }))
  ];
  ps.queue.unshift(...returned);
  ps.courts = ps.courts.filter(c => c.id !== courtId);
  ps.courts.forEach((c, i) => { c.courtNum = i + 1; });
  psFillCourts();
  saveAll(); renderAll(); closeModal();
  toast('Match skipped — players returned to front of queue.', 'info');
}

// Set winner on a PS court
function psSetWinner(courtId, team) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  selectMatchWinner(liveMatchCtxPS(courtId), team);
}

// Live match context for PS courts
function liveMatchCtxPS(courtId) {
  return {
    mode: 'ps-court',
    matchId: courtId,
    getMatch() { return state.paddleStack && state.paddleStack.courts.find(c => c.id === courtId); },
    scoreInput(team) { return document.querySelector(`input[data-ps-score="${courtId}-${team}"]`); },
    winBtn(team) { return document.querySelector(`.ps-win-btn[data-court="${courtId}"][data-team="${team}"]`); },
    render() { renderActiveView(); }
  };
}

// Render the full paddle stack match view
function renderPaddleStackView(el) {
  const ps = state.paddleStack;
  if (!ps) {
    el.innerHTML = `<div class="empty-state"><div class="big">🏓</div><div class="et">No Active Session</div><p>Start a new Open Play session from the Match tab.</p></div>`;
    return;
  }

  const courts = ps.courts;
  let html = `<div class="section-title">🏓 Open Play — ${courts.length} Court${courts.length !== 1 ? 's' : ''} Live</div>`;

  courts.forEach(m => {
    if (m.serving === undefined) m.serving = 'A';
    if (m.serverNum === undefined) m.serverNum = 1;
    if (m.firstServe === undefined) m.firstServe = true;
    const pA1 = getPlayer(m.teamA[0]), pA2 = getPlayer(m.teamA[1]);
    const pB1 = getPlayer(m.teamB[0]), pB2 = getPlayer(m.teamB[1]);
    const activeA = m.winner === 'A', activeB = m.winner === 'B';
    const servingA = m.serving === 'A', servingB = m.serving === 'B';
    const serveLabel = m.firstServe ? '1st Serve' : `Serve ${m.serverNum}`;
    const winTarget = (m.raceActive ? 2 : (ps.winningScore || 11));
    const typeLabel = psMatchTypeLabel(m.matchType);

    const canSwap = !m.winner && !hasMatchStarted(m) && ps.queue.length > 0;
    function nameTag(team, playerId, slot) {
      const p = getPlayer(playerId);

// Manually override a queue entry's status tag (🆕 New / 🏆 Winner / 💀 Loser).
// Lets an organizer fix a mismatch themselves — e.g. after reordering the
// queue by hand, a block can end up with mixed tags (W, W, L, L) instead of
// a clean same-status group. Re-tagging the moved player keeps the
// Winners/Losers block logic (and the match-type label it drives) consistent.
function psSetQueueTag(idx, tag) {
  const ps = state.paddleStack;
  if (!ps || isNaN(idx) || idx < 0 || idx >= ps.queue.length) return;
  if (tag !== 'W' && tag !== 'L' && tag !== 'N') return;
  psPushHistory();
  ps.queue[idx].tag = tag;
  saveAll(); renderAll();
}

// Same idea, but for a player currently on a court (before/while their match
// is live). Recomputes the court's matchType so the "Winners vs Winners" /
// "Mixed" label on the match card stays accurate after the change.
function psSetCourtTag(courtId, team, i, tag) {
  const ps = state.paddleStack;
  if (!ps) return;
  if (tag !== 'W' && tag !== 'L' && tag !== 'N') return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  const tagsKey = team === 'A' ? 'tagsA' : 'tagsB';
  if (!m[tagsKey] || i < 0 || i >= m[tagsKey].length) return;
  psPushHistory();
  m[tagsKey][i] = tag;
  const teamAEntries = m.teamA.map((id, idx) => ({ id, tag: m.tagsA[idx] }));
  const teamBEntries = m.teamB.map((id, idx) => ({ id, tag: m.tagsB[idx] }));
  m.matchType = psMatchType(teamAEntries, teamBEntries);
  saveAll(); renderAll();
}


// arrows in the Queue tab so an organizer can manually bump someone without
// doing a full player swap.
function psMoveQueueEntry(idx, dir) {
  const ps = state.paddleStack;
  if (!ps || isNaN(idx)) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= ps.queue.length || idx < 0 || idx >= ps.queue.length) return;
  psPushHistory();
  const [entry] = ps.queue.splice(idx, 1);
  ps.queue.splice(newIdx, 0, entry);
  saveAll(); renderAll();
}

// Move a queue entry to an arbitrary index (used by "Move to Front"/"Move to Back")
function psMoveQueueEntryTo(idx, newIdx) {
  const ps = state.paddleStack;
  if (!ps || isNaN(idx) || isNaN(newIdx)) return;
  if (idx < 0 || idx >= ps.queue.length) return;
  newIdx = Math.max(0, Math.min(newIdx, ps.queue.length - 1));
  if (newIdx === idx) return;
  psPushHistory();
  const [entry] = ps.queue.splice(idx, 1);
  ps.queue.splice(newIdx, 0, entry);
  saveAll(); renderAll();
}

// Build the end-of-session summary block (games played, W/L) shown in the
// "End Session?" confirmation, scoped to matches recorded during this PS
// session only (via ps.sessionMatchIds).
function psSessionSummaryHtml(ps) {
  if (!ps || !Array.isArray(ps.sessionMatchIds) || !ps.sessionMatchIds.length) return '';
  const idSet = new Set(ps.sessionMatchIds);
  const sessionMatches = state.matches.filter(m => idSet.has(m.id));
  if (!sessionMatches.length) return '';
  const tally = {}; // id -> {played, wins, losses}
  sessionMatches.forEach(m => {
    [...m.teamA, ...m.teamB].forEach(id => {
      if (!tally[id]) tally[id] = { played: 0, wins: 0, losses: 0 };
      tally[id].played++;
    });
    m.winners.forEach(id => { if (tally[id]) tally[id].wins++; });
    m.losers.forEach(id => { if (tally[id]) tally[id].losses++; });
  });
  const rows = Object.keys(tally)
    .map(id => ({ id, name: getPlayer(id)?.name || '—', ...tally[id] }))
    .sort((a, b) => b.played - a.played || b.wins - a.wins)
    .map(r => `<div class="queue-row"><span style="font-size:13px; flex:1;">${esc(r.name)}</span><span style="font-size:11px; color:var(--text-faint);">${r.played} played · ${r.wins}W-${r.losses}L</span></div>`)
    .join('');
  return `
    <div class="eyebrow" style="margin:14px 2px 6px;">This Session</div>
    <div class="card" style="padding:6px 4px; max-height:220px; overflow-y:auto;">${rows}</div>
  `;
}

// Render queue view for paddle stack mode
function renderPaddleStackQueueView(el) {
  const ps = state.paddleStack;
  if (!ps) {
    el.innerHTML = `<div class="empty-state"><div class="big">🏓</div><p>No active Open Play session.</p></div>`;
    return;
  }

  const blockSize = ps.blockSize || 4;
  const onCourtIds = new Set(ps.courts.flatMap(c => [...c.teamA, ...c.teamB]));
  const tagLabel = t => t === 'W' ? '🏆 Winner' : t === 'L' ? '💀 Loser' : '🆕 New';
  const tagColor = t => t === 'W' ? 'var(--win)' : t === 'L' ? 'var(--loss)' : 'var(--ball)';
  const isAvailable = e => { const pl = getPlayer(e.id); return pl && pl.active && (pl.condition || 'ok') === 'ok'; };

  // Rolling average match duration this session, used for the rough
  // per-position wait estimate below. null until enough data exists.
  const avgDurMs = (Array.isArray(ps.matchDurations) && ps.matchDurations.length)
    ? ps.matchDurations.reduce((a, b) => a + b, 0) / ps.matchDurations.length
    : null;
  const fmtWait = ms => {
    const mins = Math.round(ms / 60000);
    if (mins < 1) return '<1 min';
    return `~${mins} min`;
  };

  let html = `
    <div class="section-title">🏓 Paddle Stack Queue</div>
    <p class="helper-text" style="margin:-4px 2px 10px;">Shared queue across all courts. Winners (🏆) and Losers (💀) stack in blocks of ${blockSize}. When a block fills, it joins the queue. Next 4 from the front fill the next open court. 🆕 New arrivals go straight to the front. With few players, partial blocks merge automatically so play never stalls.</p>
    <button class="btn btn-secondary btn-sm btn-block" style="margin-bottom:10px;" data-action="ps-add-guest">➕ Add Walk-in Guest</button>
  `;

  // On-court section
  if (ps.courts.length) {
    html += `<div class="section-title" style="color:var(--win);">▶ On Court (${ps.courts.length * 4})</div>`;
    html += `<div class="card" style="padding:6px 4px;">`;
    ps.courts.forEach(m => {
      [...m.teamA.map((id, i) => ({id, tag: m.tagsA[i], team:'A', i})), ...m.teamB.map((id, i) => ({id, tag: m.tagsB[i], team:'B', i}))].forEach(entry => {
        const p = getPlayer(entry.id);
        html += `<div class="queue-row" style="align-items:center;">
          <span class="qrank" style="background:rgba(62,213,152,0.15); color:var(--win);">C${m.courtNum}</span>
          <span style="font-size:13px; flex:1;">${esc(p?.name || '—')}</span>
          <span style="font-size:11px; color:${tagColor(entry.tag)};">${tagLabel(entry.tag)}</span>
          <button class="btn btn-ghost btn-sm" style="padding:6px 10px; flex:none;" data-action="ps-court-tag-menu" data-court-id="${m.id}" data-team="${entry.team}" data-i="${entry.i}" title="Change status">⇅</button>
        </div>`;
      });
    });
    html += `</div>`;
  }

  // Accumulating blocks
  const wBlockShown = ps.wBlock.filter(isAvailable);
  const lBlockShown = ps.lBlock.filter(isAvailable);
  if (wBlockShown.length || lBlockShown.length) {
    html += `<div class="section-title">⏳ Accumulating Blocks</div><div class="card" style="padding:6px 14px;">`;
    if (wBlockShown.length) {
      html += `<p style="font-size:12px; color:var(--text-faint); margin:6px 0 4px; font-weight:700;">🏆 Winners Block (${wBlockShown.length}/${blockSize} — flushes to queue at ${blockSize})</p>`;
      wBlockShown.forEach((e, i) => {
        const p = getPlayer(e.id);
        html += `<div class="queue-row" style="border-left:3px solid var(--win); padding-left:10px;"><span class="qrank">${i+1}</span><span style="font-size:13px;">${esc(p?.name||'—')}</span></div>`;
      });
    }
    if (lBlockShown.length) {
      html += `<p style="font-size:12px; color:var(--text-faint); margin:10px 0 4px; font-weight:700;">💀 Losers Block (${lBlockShown.length}/${blockSize} — flushes to queue at ${blockSize})</p>`;
      lBlockShown.forEach((e, i) => {
        const p = getPlayer(e.id);
        html += `<div class="queue-row" style="border-left:3px solid var(--loss); padding-left:10px;"><span class="qrank">${i+1}</span><span style="font-size:13px;">${esc(p?.name||'—')}</span></div>`;
      });
    }
    html += `</div>`;
  }

  // Main queue
  const visibleCount = ps.queue.filter(isAvailable).length;
  if (visibleCount) {
    html += `<div class="section-title">📋 Queue (${visibleCount})</div>`;
    html += `<div class="card" style="padding:6px 4px;">`;
    ps.queue.forEach((entry, i) => {
      if (!isAvailable(entry)) return; // temporarily unavailable (Tired/Injured/Gone Home) — hidden, still filtered out for real at the next court fill
      const p = getPlayer(entry.id);
      const isNextFour = i < 4;
      const roundsWaited = typeof entry.sinceRound === 'number' ? Math.max(0, state.round - entry.sinceRound) : 0;
      const cyclesAhead = Math.floor(i / 4 / Math.max(1, ps.numCourts));
      const waitEstimate = (!isNextFour && avgDurMs) ? fmtWait(cyclesAhead * avgDurMs) : null;
      const metaBits = [
        `<span style="color:${tagColor(entry.tag)};">${tagLabel(entry.tag)}</span>`,
        roundsWaited >= 2 ? `<span style="color:var(--loss); font-weight:700;">⏱ waited ${roundsWaited}</span>` : '',
        waitEstimate ? `<span style="color:var(--text-faint);">${waitEstimate}</span>` : '',
        (isNextFour && i === 0) ? `<span style="font-weight:800; color:var(--ball);">NEXT UP →</span>` : ''
      ].filter(Boolean).join('<span style="color:var(--text-faint);"> · </span>');
      html += `<div class="queue-row" style="align-items:center; ${isNextFour ? 'background:rgba(215,242,61,0.06);' : ''}">
        <span class="qrank" style="${isNextFour ? 'background:var(--ball); color:#10150a;' : ''}">${i + 1}</span>
        <span style="flex:1; min-width:0;">
          <div style="font-size:13px; font-weight:${isNextFour ? '700' : '400'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(p?.name || '—')}</div>
          <div style="font-size:10.5px; margin-top:2px;">${metaBits}</div>
        </span>
        <button class="btn btn-ghost btn-sm" style="padding:6px 10px; flex:none;" data-action="ps-queue-move-menu" data-idx="${i}" title="Move in queue">⇅</button>
      </div>`;
    });
    html += `</div>`;
  } else if (!ps.courts.length && !wBlockShown.length && !lBlockShown.length) {
    html += `<div class="empty-state"><p>Queue empty — waiting for match results to accumulate.</p></div>`;
  }

  el.innerHTML = html;
}

// Start paddle stack session setup modal
function openPaddleStackSetupModal() {
  const pool = activePlayers();
  const activeCount = pool.length;
  // hardMax mirrors the real ceiling used everywhere else (psInit clamps
  // numCourts to 1-10) — maxPossible is just how many preset buttons to
  // show (capped at 6 so the list doesn't get unwieldy). Custom court count
  // lets anyone with enough players reach past that 6-button visual cap, up
  // to hardMax, by typing a number instead.
  const hardMax = Math.max(1, Math.min(Math.floor(activeCount / 4), 10));
  const maxPossible = Math.min(hardMax, 6);
  const currentCourts = clamp(parseInt(state.settings.numCourts, 10) || 1, 1, hardMax);
  const currentScore = state.settings.winningScore || 11;
  const isCustomValue = currentCourts > maxPossible;

  const courtPreviewText = n => {
    const playersNeeded = n * 4;
    const waiting = activeCount - playersNeeded;
    return `${playersNeeded} on court${waiting > 0 ? ` · ${waiting} in queue` : ' · everyone plays'}`;
  };

  const courtBtns = Array.from({length: maxPossible || 1}, (_, i) => i + 1).map(n => {
    const isSelected = n === currentCourts && !isCustomValue;
    return `
      <button type="button" class="session-opt ${isSelected ? 'recommended' : ''}" data-action="ps-pick-courts" data-courts="${n}">
        <div class="session-opt-count"><span class="n">${n}</span><span class="u">court${n>1?'s':''}</span></div>
        <div class="session-opt-body">
          <div class="session-opt-name">${n === 1 ? 'Single Court' : n + ' Courts'}${isSelected ? '<span class="session-opt-tag">Current</span>' : ''}</div>
          <div class="session-opt-sub">${courtPreviewText(n)}</div>
        </div>
        <div class="session-opt-check" style="${isSelected ? 'border-color:var(--ball); background:var(--ball);' : ''}"></div>
      </button>`;
  }).join('');

  const currentRandomize = state.settings.psRandomizeStart !== false;
  // Block Size is no longer configurable from the setup screen — always use
  // the classic paddle-stack default of 4 winners/losers per block.
  state.settings.psBlockSize = 4;
  const currentGenderPairing = state.settings.psMixedGenderPairing !== false;

  openModal(`
    <div class="modal-title">🎯 Paddle Stack Setup</div>
    <div class="modal-sub" style="line-height:1.6;"><strong style="color:var(--text);">${activeCount} player${activeCount !== 1 ? 's' : ''}</strong> ready. Winners and Losers stack in blocks, then rejoin the shared queue.</div>

    <div class="eyebrow" style="margin:14px 2px 8px;">Starting Order</div>
    <div style="display:flex; gap:8px; margin-bottom:4px;">
      <button type="button" class="btn ${currentRandomize ? 'btn-primary' : 'btn-secondary'} btn-sm" style="flex:1;" data-action="ps-toggle-randomize" data-value="true">🔀 Random</button>
      <button type="button" class="btn ${!currentRandomize ? 'btn-primary' : 'btn-secondary'} btn-sm" style="flex:1;" data-action="ps-toggle-randomize" data-value="false">📋 Player List Order</button>
    </div>
    <p class="helper-text" style="margin:2px 2px 8px;">${currentRandomize ? 'First matches are shuffled — not based on who checked in first.' : 'First matches follow roster/check-in order.'}</p>

    <div class="eyebrow" style="margin:14px 2px 8px;">Male/Female Generation</div>
    <div class="card" style="margin:0 0 4px; padding:4px 14px;">
      <div class="toggle-row">
        <div>
          <div class="t-label">⚥ Mixed Gender Pairing</div>
          <div class="t-hint">Pair a male with a female partner at the start of the session whenever the roster allows it. Turn off to ignore gender when building the starting order.</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="psGenderPairingToggle" ${currentGenderPairing ? 'checked' : ''}>
          <div class="track"></div><div class="thumb"></div>
        </label>
      </div>
    </div>

    <div class="eyebrow" style="margin:16px 2px 8px;">Fixed Duos 🔗</div>
    <div class="card" style="margin:0 0 4px;">
      <p class="helper-text" style="margin-top:0;">Lock two players together so they always start and stay on the same team. Honored in Paddle Stack Queue.</p>
      ${(state.fixedDuos && state.fixedDuos.length) ? state.fixedDuos.map(([id1,id2]) => `
        <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line-soft);">
          <span style="font-weight:700; font-size:13.5px;">${esc(playerName(id1))} <span style="color:var(--ball);">🔗</span> ${esc(playerName(id2))}</span>
          <button class="btn btn-ghost btn-sm" data-action="remove-fixed-duo" data-p1="${id1}" data-p2="${id2}" data-return="paddlestack">Remove</button>
        </div>
      `).join('') : `<p class="helper-text" style="margin:0; color:var(--text-faint);">No fixed duos set.</p>`}
      <button class="btn btn-secondary btn-block" style="margin-top:12px;" data-action="open-add-fixed-duo" data-return="paddlestack">+ Add Fixed Duo</button>
    </div>

    <div class="eyebrow" style="margin:14px 2px 8px;">How many courts?</div>
    <div class="session-opt-list" id="psCourtsListPs">
      ${courtBtns}
      ${maxPossible < 1 ? '<p class="helper-text" style="color:var(--loss);">Need at least 4 active players.</p>' : ''}
      <div class="session-opt custom-opt" id="psCustomCourtsRow" style="cursor:default; align-items:flex-start;">
        <div class="session-opt-count"><span class="n">✏️</span></div>
        <div class="session-opt-body">
          <div class="session-opt-name" id="psCustomCourtsName">Custom${isCustomValue ? '<span class="session-opt-tag">Current</span>' : ''}</div>
          <input type="number" id="psCustomCourtsInput" inputmode="numeric" pattern="[0-9]*" min="1" max="${hardMax}"
            placeholder="e.g. ${Math.min(hardMax, maxPossible + 1)}" value="${isCustomValue ? currentCourts : ''}"
            style="margin-top:8px; max-width:120px; font-weight:700; text-align:center;"
            oninput="window.psPickCustomCourts(this.value)">
          <div class="session-opt-sub" id="psCustomCourtsPreview" style="margin-top:6px;">${isCustomValue ? courtPreviewText(currentCourts) : `Up to ${hardMax} court${hardMax!==1?'s':''} possible with ${activeCount} players`}</div>
        </div>
        <div class="session-opt-check" id="psCustomCourtsCheck" style="${isCustomValue ? 'border-color:var(--ball); background:var(--ball);' : ''}"></div>
      </div>
    </div>

    <div class="eyebrow" style="margin:16px 2px 8px;">Winning Score</div>
    <div class="card" style="margin:0 0 4px;">
      <div class="field" style="margin:0;">
        <input type="number" id="psWinScoreInput" min="1" max="99" value="${currentScore}" style="font-size:18px; font-weight:700; text-align:center;">
        <p class="helper-text" style="margin:6px 2px 0;">First team to reach this score (win by 2) wins the match.</p>
      </div>
    </div>

    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-ghost" data-action="modal-close">Cancel</button>
      <button class="btn btn-primary" data-action="ps-confirm-start">🚀 Start Paddle Stack</button>
    </div>
  `, false);

  // Typing a custom court count deselects the preset buttons and applies the
  // typed value live (clamped to hardMax — the real 1-10 ceiling psInit
  // enforces, same as every other "how many courts" picker in the app).
  window.psPickCustomCourts = function(val){
    const previewEl = document.getElementById('psCustomCourtsPreview');
    const checkEl = document.getElementById('psCustomCourtsCheck');
    const raw = parseInt(val, 10);
    if(isNaN(raw) || raw < 1){
      if(previewEl) previewEl.textContent = `Up to ${hardMax} court${hardMax!==1?'s':''} possible with ${activeCount} players`;
      if(checkEl){ checkEl.style.borderColor = ''; checkEl.style.background = ''; }
      return;
    }
    const n = clamp(raw, 1, hardMax);
    state.settings.numCourts = n;
    if(previewEl) previewEl.textContent = courtPreviewText(n);
    if(checkEl){ checkEl.style.borderColor = 'var(--ball)'; checkEl.style.background = 'var(--ball)'; }
    // Clear any preset button's selected look — the typed value is now the source of truth.
    document.querySelectorAll('[data-action="ps-pick-courts"]').forEach(btn => {
      const check = btn.querySelector('.session-opt-check');
      btn.classList.remove('recommended');
      if(check){ check.style.borderColor = ''; check.style.background = ''; }
    });
  };
}

// Returns this court's own (not-yet-started) match type: 'WW', 'LL', 'NN',
// 'MX', or null if the court doesn't exist. Used to decide whether the
// Switch Player button should offer a same-court "Switch Partner" re-pair
// (only valid for WW/LL) instead of a queue swap.
function psNextMatchType(courtId) {
  const ps = state.paddleStack;
  if (!ps) return null;
  const m = ps.courts.find(c => c.id === courtId);
  return m ? m.matchType : null;
}

// Safe tag read — falls back to 'N' for older saved sessions that pre-date tagsA/tagsB.
function psTag(m, team, slot) {
  const arr = team === 'A' ? m.tagsA : m.tagsB;
  return (arr && arr[slot]) ? arr[slot] : 'N';
}

// If the player leaving `slot` has a Fixed Duo partner who is their CURRENT
// teammate on this same court, swapping them out splits the duo up. Doesn't
// block the swap (an injury or no-show may make that unavoidable) — just
// returns a short note to tack onto the confirmation toast so the organizer
// notices.
function psDuoBreakNote(m, team, slot) {
  const outId = team === 'A' ? m.teamA[slot] : m.teamB[slot];
  const partnerId = getFixedDuoPartner(outId);
  if (!partnerId) return '';
  const teammates = team === 'A' ? m.teamA : m.teamB;
  return teammates.includes(partnerId) ? ' ⚠️ Splits up a Fixed Duo.' : '';
}

// Every player currently sitting in the accumulating Winners/Losers blocks
// (already off any court, waiting for their block to fill and flush to the
// queue) — also fair game for a swap-in, same as queue/bench/other courts.
function psBlockCandidates() {
  const ps = state.paddleStack;
  if (!ps) return [];
  const out = [];
  (ps.wBlock || []).forEach((e, i) => {
    const p = getPlayer(e.id);
    if (p) out.push({ id: e.id, name: p.name, tag: e.tag || 'W', block: 'w', blockIdx: i });
  });
  (ps.lBlock || []).forEach((e, i) => {
    const p = getPlayer(e.id);
    if (p) out.push({ id: e.id, name: p.name, tag: e.tag || 'L', block: 'l', blockIdx: i });
  });
  return out;
}

// Every player currently occupying a slot on a DIFFERENT court whose match
// hasn't started scoring yet and has no winner — i.e. safe to pull into a
// cross-court swap. Used so "Swap In a Player" isn't limited to the queue
// and bench, but can reach across to any other active player on the floor.
function psOtherCourtCandidates(excludeCourtId) {
  const ps = state.paddleStack;
  if (!ps) return [];
  const out = [];
  ps.courts.forEach(c => {
    if (c.id === excludeCourtId) return;
    if (c.winner || hasMatchStarted(c)) return; // mid-score — don't disturb
    ['A', 'B'].forEach(team => {
      const ids = team === 'A' ? c.teamA : c.teamB;
      ids.forEach((id, slot) => {
        const p = getPlayer(id);
        if (!p) return;
        out.push({ id, name: p.name, team, slot, courtId: c.id, courtNum: c.courtNum, tag: psTag(c, team, slot) });
      });
    });
  });
  return out;
}

// Open the Switch Player / Switch Partner modal for a Paddle Stack court.
// "Switch Player"  = generic swap: pick any on-court player and replace them
//                    with a queued player (queued player goes to their spot,
//                    on-court player goes to the queue at the swapped position).
// "Switch Partner" = only shown when the NEXT match is W vs W or L vs L:
//                    re-pair within the same side so both players stay on court
//                    but swap their partners (A1 ↔ B1 style swap), keeping the
//                    upcoming match type intact.
function openPsSwitchPlayerModal(courtId, forcePlainSwap, forcePartnerSwap) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;

  if (m.winner || hasMatchStarted(m)) {
    toast('Match already decided — cannot switch players.', 'warning');
    return;
  }

  const nextType = psNextMatchType(courtId);
  const isPartnerSwap = forcePartnerSwap || (!forcePlainSwap && (nextType === 'WW' || nextType === 'LL'));
  const tagIcon = t => t === 'W' ? '🏆' : t === 'L' ? '💀' : '🆕';

  const onCourtIds = new Set(ps.courts.flatMap(c => [...c.teamA, ...c.teamB]));
  const hasSwapInOptions = ps.queue.length > 0
    || availableSubPlayers().some(p => !onCourtIds.has(p.id))
    || psOtherCourtCandidates(courtId).length > 0
    || psBlockCandidates().length > 0;

  const pA1 = getPlayer(m.teamA[0]), pA2 = getPlayer(m.teamA[1]);
  const pB1 = getPlayer(m.teamB[0]), pB2 = getPlayer(m.teamB[1]);

  if (isPartnerSwap) {
    // Partner swap: show all 4 cross-team pair options. Both players stay on court,
    // they just swap to opposite teams re-pairing with the other player.
    const title = '🔄 Switch Partner';
    const subtitle = (nextType === 'WW' || nextType === 'LL')
      ? 'Next match is <b style="color:var(--win);">Winners vs Winners</b> or <b style="color:var(--loss);">Losers vs Losers</b>. Pick two players across teams to swap — both stay on court, just re-paired.'
      : 'Pick two players across teams to swap — both stay on court, just re-paired with a new partner.';

    const swapOptions = [
      { labelA: esc(pA1?.name || '—'), labelB: esc(pB1?.name || '—'), swapIdx: '0-0' },
      { labelA: esc(pA1?.name || '—'), labelB: esc(pB2?.name || '—'), swapIdx: '0-1' },
      { labelA: esc(pA2?.name || '—'), labelB: esc(pB1?.name || '—'), swapIdx: '1-0' },
      { labelA: esc(pA2?.name || '—'), labelB: esc(pB2?.name || '—'), swapIdx: '1-1' },
    ];
    const optHtml = swapOptions.map(o => `
      <button class="btn btn-secondary btn-block" style="margin-top:8px; justify-content:space-between;"
        data-action="ps-do-partner-swap" data-court="${courtId}" data-swap="${o.swapIdx}">
        <span style="display:flex; align-items:center; gap:8px;">
          <span style="color:var(--ball);">${o.labelA}</span>
          <span style="color:var(--text-faint); font-size:11px;">↔</span>
          <span style="color:var(--court);">${o.labelB}</span>
        </span>
        <span style="font-size:11px; color:var(--text-faint);">Swap Partners</span>
      </button>`).join('');

    openModal(`
      <div class="modal-title">${title}</div>
      <div class="modal-sub" style="line-height:1.6;">${subtitle}</div>
      <div class="eyebrow" style="margin:12px 2px 6px;">Pick the pair to swap</div>
      ${optHtml}
      <div class="modal-actions" style="margin-top:14px; flex-direction:column; gap:8px;">
        ${hasSwapInOptions ? `<button class="btn btn-secondary btn-block" data-action="ps-switch-player-force" data-court="${courtId}">Someone wants to rest instead →</button>` : ''}
        <button class="btn btn-ghost btn-block" data-action="modal-close">Cancel</button>
      </div>
    `);
  } else {
    // Player swap: pick which on-court player to remove, then pick the replacement
    // from the queue or bench. Guard up-front so the user never hits a dead end.
    const title = '🔄 Switch Player';
    if (!hasSwapInOptions) {
      openModal(`
        <div class="modal-title">${title}</div>
        <div class="modal-sub" style="line-height:1.6;">No one is waiting in the queue or available on the bench right now — nobody to swap in.</div>
        <div class="modal-actions" style="margin-top:14px; flex-direction:column; gap:8px;">
          <button class="btn btn-secondary btn-block" data-action="ps-switch-player-force-partner" data-court="${courtId}">🔄 Switch Partner instead →</button>
          <button class="btn btn-ghost btn-block" data-action="modal-close">Close</button>
        </div>
      `);
      return;
    }

    const subtitle = 'Replace an on-court player with someone from the queue or bench. The removed player returns to the queue.';
    const courtPlayers = [
      { id: m.teamA[0], team: 'A', slot: 0, name: pA1?.name || '—', tag: psTag(m, 'A', 0) },
      { id: m.teamA[1], team: 'A', slot: 1, name: pA2?.name || '—', tag: psTag(m, 'A', 1) },
      { id: m.teamB[0], team: 'B', slot: 0, name: pB1?.name || '—', tag: psTag(m, 'B', 0) },
      { id: m.teamB[1], team: 'B', slot: 1, name: pB2?.name || '—', tag: psTag(m, 'B', 1) },
    ];
    const courtHtml = courtPlayers.map(cp => `
      <button class="btn btn-secondary btn-block" style="margin-top:8px; justify-content:space-between;"
        data-action="ps-pick-swap-out" data-court="${courtId}" data-team="${cp.team}" data-slot="${cp.slot}">
        <span>${tagIcon(cp.tag)} ${esc(cp.name)} <span style="font-size:11px; color:var(--text-faint);">Team ${cp.team}</span></span>
        <span style="font-size:11px; color:var(--loss);">Remove →</span>
      </button>`).join('');

    openModal(`
      <div class="modal-title">${title}</div>
      <div class="modal-sub" style="line-height:1.6;">${subtitle}</div>
      <div class="eyebrow" style="margin:12px 2px 6px;">Who's leaving the court?</div>
      ${courtHtml}
      <div class="modal-actions" style="margin-top:14px; flex-direction:column; gap:8px;">
        <button class="btn btn-secondary btn-block" data-action="ps-switch-player-force-partner" data-court="${courtId}">🔄 Switch Partner instead →</button>
        <button class="btn btn-ghost btn-block" data-action="modal-close">Cancel</button>
      </div>
    `);
  }
}

// Step 2 of Switch Player: pick the queued replacement for the chosen on-court player.
function openPsPickSwapInModal(courtId, team, slot) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  if (m.winner || hasMatchStarted(m)) {
    toast('Scoring already started on this court — can\'t swap once a match is underway.', 'warning');
    return;
  }

  const outId = team === 'A' ? m.teamA[slot] : m.teamB[slot];
  const outPlayer = getPlayer(outId);
  const outTag = psTag(m, team, slot);
  const tagIcon = t => t === 'W' ? '🏆' : t === 'L' ? '💀' : '🆕';

  const onCourtIds = new Set(ps.courts.flatMap(c => [...c.teamA, ...c.teamB]));
  const subs = availableSubPlayers().filter(p => !onCourtIds.has(p.id));
  const otherCourt = psOtherCourtCandidates(courtId);
  const blocks = psBlockCandidates();

  if (!ps.queue.length && !subs.length && !otherCourt.length && !blocks.length) {
    toast('No other players available to swap in.', 'warning');
    return;
  }

  const queueHtml = ps.queue.slice(0, 8).map((entry, i) => {
    const p = getPlayer(entry.id);
    return `
      <button class="btn btn-secondary btn-block" style="margin-top:6px; justify-content:space-between;"
        data-action="ps-do-switch-player" data-court="${courtId}" data-team="${team}" data-slot="${slot}" data-queue-idx="${i}">
        <span>${tagIcon(entry.tag || 'N')} ${esc(p?.name || '—')}</span>
        <span style="font-size:11px; color:var(--text-faint);">#${i + 1} in queue</span>
      </button>`;
  }).join('');

  const subHtml = subs.map(p => `
    <button class="btn btn-secondary btn-block" style="margin-top:6px; justify-content:space-between;"
      data-action="ps-do-switch-player-sub" data-court="${courtId}" data-team="${team}" data-slot="${slot}" data-sub="${p.id}">
      <span>🔁 ${esc(p.name)}</span>
      <span style="font-size:11px; color:var(--text-faint);">Sub Player</span>
    </button>`).join('');

  // Any active player currently on another (not-yet-started) court — picking
  // one performs a straight position swap: they come here, and the player
  // being replaced takes their old spot on that other court.
  const otherCourtHtml = otherCourt.map(c => `
    <button class="btn btn-secondary btn-block" style="margin-top:6px; justify-content:space-between;"
      data-action="ps-do-switch-player-court" data-court="${courtId}" data-team="${team}" data-slot="${slot}"
      data-from-court="${c.courtId}" data-from-team="${c.team}" data-from-slot="${c.slot}">
      <span>${tagIcon(c.tag)} ${esc(c.name)}</span>
      <span style="font-size:11px; color:var(--text-faint);">Court ${c.courtNum} — will swap</span>
    </button>`).join('');

  // Players waiting in the Winners/Losers accumulation blocks — off any
  // court, not yet flushed to the queue, but still fair game to swap in.
  const blockHtml = blocks.map(b => `
    <button class="btn btn-secondary btn-block" style="margin-top:6px; justify-content:space-between;"
      data-action="ps-do-switch-player-block" data-court="${courtId}" data-team="${team}" data-slot="${slot}"
      data-block="${b.block}" data-block-idx="${b.blockIdx}">
      <span>${tagIcon(b.tag)} ${esc(b.name)}</span>
      <span style="font-size:11px; color:var(--text-faint);">${b.block === 'w' ? 'Winners' : 'Losers'} block</span>
    </button>`).join('');

  openModal(`
    <div class="modal-title">Swap In a Player</div>
    <div class="modal-sub">Replacing <b style="color:var(--loss);">${esc(outPlayer?.name || '—')}</b> (${tagIcon(outTag)} Team ${team}). The swapped-out player returns to their queue position (or takes the incoming player's old spot).</div>
    ${queueHtml ? `<div class="eyebrow" style="margin:12px 2px 6px;">Pick from queue</div>${queueHtml}` : ''}
    ${ps.queue.length > 8 ? `<p class="helper-text" style="text-align:center;">Showing first 8 — see Queue tab for full list.</p>` : ''}
    ${subHtml ? `<div class="eyebrow" style="margin:14px 2px 6px;">Sub Players on the bench</div>${subHtml}` : ''}
    ${otherCourtHtml ? `<div class="eyebrow" style="margin:14px 2px 6px;">On other courts</div>${otherCourtHtml}` : ''}
    ${blockHtml ? `<div class="eyebrow" style="margin:14px 2px 6px;">Waiting in a block</div>${blockHtml}` : ''}
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-ghost btn-block" data-action="modal-close">Cancel</button>
    </div>
  `);
}

// Execute the Switch Player swap: queued player steps onto court, on-court player
// goes back to the queue at the position the incoming player vacated.
// "I'm resting" — step 1: confirm before touching anything, since this is a
// single tap right next to the score buttons and easy to hit by accident.
function psRestPlayer(courtId, team, slot) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  if (m.winner || hasMatchStarted(m)) {
    toast('Match already decided — cannot switch players.', 'warning');
    return;
  }
  if (!ps.queue.length) {
    toast('No players in the queue to swap in.', 'warning');
    return;
  }
  const outId = team === 'A' ? m.teamA[slot] : m.teamB[slot];
  const outName = getPlayer(outId)?.name || 'This player';
  const inName = getPlayer(ps.queue[0].id)?.name || 'the next player in queue';
  openModal(`
    <div class="modal-title">${esc(outName)} Rests?</div>
    <div class="modal-sub">${esc(inName)} steps in from the front of the queue. ${esc(outName)} goes back to the queue in their place.</div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-ghost" data-action="modal-close">Cancel</button>
      <button class="btn btn-secondary" data-action="ps-do-rest-player" data-court="${courtId}" data-team="${team}" data-slot="${slot}">Yes, Rest ${esc(outName)}</button>
    </div>
  `);
}

// Step 2: actually perform the swap after confirmation.
function psDoRestPlayer(courtId, team, slot) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  if (m.winner || hasMatchStarted(m)) {
    toast('Match already decided — cannot switch players.', 'warning');
    return;
  }
  if (!ps.queue.length) {
    toast('No players in the queue to swap in.', 'warning');
    return;
  }

}

function psdoSwitchPlayer(courtId, team, slot, queueIdx) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m || queueIdx < 0 || queueIdx >= ps.queue.length) return;

  // Ensure tagsA/tagsB arrays exist (older saved sessions may lack them)
  if (!Array.isArray(m.tagsA)) m.tagsA = ['N', 'N'];
  if (!Array.isArray(m.tagsB)) m.tagsB = ['N', 'N'];

  const outId  = team === 'A' ? m.teamA[slot] : m.teamB[slot];
  const outTag = psTag(m, team, slot);
  const inEntry = ps.queue[queueIdx];

  // Guard: don't swap a player in for themselves (shouldn't happen, but be safe)
  if (inEntry.id === outId) {
    toast('That player is already on court.', 'warning');
    closeModal();
    return;
  }

  const duoNote = psDuoBreakNote(m, team, slot);
  psPushHistory();

  // Place the incoming player on court
  if (team === 'A') { m.teamA[slot] = inEntry.id; m.tagsA[slot] = inEntry.tag || 'N'; }
  else              { m.teamB[slot] = inEntry.id; m.tagsB[slot] = inEntry.tag || 'N'; }

  // Put the on-court player back at the same queue position
  ps.queue.splice(queueIdx, 1, { id: outId, tag: outTag });

  // Recompute match type label
  m.matchType = psMatchType(
    [{ id: m.teamA[0], tag: m.tagsA[0] || 'N' }, { id: m.teamA[1], tag: m.tagsA[1] || 'N' }],
    [{ id: m.teamB[0], tag: m.tagsB[0] || 'N' }, { id: m.teamB[1], tag: m.tagsB[1] || 'N' }]
  );

  saveAll(); renderAll(); closeModal();
  toast(`${playerName(inEntry.id)} steps in — ${playerName(outId)} returns to queue.${duoNote}`, duoNote ? 'warning' : 'success');
}

// Bring a bench Sub Player onto court in place of an existing player.
// Unlike psdoSwitchPlayer, the incoming player isn't coming from ps.queue —
// they come from the sub bench — so the outgoing player simply rejoins the
// front of the queue instead of taking a specific slot.
function psdoSwitchPlayerFromSub(courtId, team, slot, subId) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  if (m.winner || hasMatchStarted(m)) {
    toast('Match already decided — cannot switch players.', 'warning');
    return;
  }

  if (!sub || !sub.isSub || !sub.active) {

    closeModal();
    return;
  }

  if (onCourtIds.has(subId)) {

    closeModal();
    return;
  }

  if (!Array.isArray(m.tagsA)) m.tagsA = ['N', 'N'];
  if (!Array.isArray(m.tagsB)) m.tagsB = ['N', 'N'];

  const outId = team === 'A' ? m.teamA[slot] : m.teamB[slot];
  const outTag = psTag(m, team, slot);
  if (outId === subId) {

    closeModal();
    return;
  }

  const duoNote = psDuoBreakNote(m, team, slot);
  psPushHistory();

  // Place the sub on court, tagged as a fresh arrival
  if (team === 'A') { m.teamA[slot] = subId; m.tagsA[slot] = 'N'; }
  else              { m.teamB[slot] = subId; m.tagsB[slot] = 'N'; }

  // Outgoing player rejoins the front of the queue with their wait clock reset to now
  ps.queue.unshift({ id: outId, tag: outTag, sinceRound: state.round });

  m.matchType = psMatchType(
    [{ id: m.teamA[0], tag: m.tagsA[0] || 'N' }, { id: m.teamA[1], tag: m.tagsA[1] || 'N' }],
    [{ id: m.teamB[0], tag: m.tagsB[0] || 'N' }, { id: m.teamB[1], tag: m.tagsB[1] || 'N' }]
  );

  toast(`${sub.name} subs in — ${playerName(outId)} returns to the queue.${duoNote}`, duoNote ? 'warning' : 'success');
}

// Bring a player in from a DIFFERENT court, swapping positions: the incoming
// player takes this slot, and the player being replaced here takes the
// incoming player's old slot on their original court. Both players' tags
// travel with them (auto-detected from wherever they currently stand), so
// a Winner stays flagged a Winner on their new court and so on.
function psdoSwitchPlayerFromCourt(courtId, team, slot, fromCourtId, fromTeam, fromSlot) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  const fromM = ps.courts.find(c => c.id === fromCourtId);
  if (!m || !fromM) return;
  if (m.winner || hasMatchStarted(m)) {
    toast('Match already decided — cannot switch players.', 'warning');
    return;
  }
  if (fromM.winner || hasMatchStarted(fromM)) {
    toast('That other court has already started scoring — can\'t pull a player out of it.', 'warning');
    return;
  }
  if (m.id === fromM.id) {
    toast('Use Switch Partner to re-pair players already on the same court.', 'warning');
    return;
  }

  if (!Array.isArray(m.tagsA)) m.tagsA = ['N', 'N'];
  if (!Array.isArray(m.tagsB)) m.tagsB = ['N', 'N'];
  if (!Array.isArray(fromM.tagsA)) fromM.tagsA = ['N', 'N'];
  if (!Array.isArray(fromM.tagsB)) fromM.tagsB = ['N', 'N'];

  const outId  = team === 'A' ? m.teamA[slot] : m.teamB[slot];
  const outTag = psTag(m, team, slot);
  const inId   = fromTeam === 'A' ? fromM.teamA[fromSlot] : fromM.teamB[fromSlot];
  const inTag  = psTag(fromM, fromTeam, fromSlot);

  if (inId === outId) {
    toast('That player is already on court.', 'warning');
    closeModal();
    return;
  }

  const duoNote = psDuoBreakNote(m, team, slot) || psDuoBreakNote(fromM, fromTeam, fromSlot);
  psPushHistory();

  // Place the incoming player here, carrying their current tag with them
  if (team === 'A') { m.teamA[slot] = inId; m.tagsA[slot] = inTag; }
  else              { m.teamB[slot] = inId; m.tagsB[slot] = inTag; }

  // The outgoing player takes the incoming player's old spot on the other court
  if (fromTeam === 'A') { fromM.teamA[fromSlot] = outId; fromM.tagsA[fromSlot] = outTag; }
  else                  { fromM.teamB[fromSlot] = outId; fromM.tagsB[fromSlot] = outTag; }

  m.matchType = psMatchType(
    [{ id: m.teamA[0], tag: m.tagsA[0] || 'N' }, { id: m.teamA[1], tag: m.tagsA[1] || 'N' }],
    [{ id: m.teamB[0], tag: m.tagsB[0] || 'N' }, { id: m.teamB[1], tag: m.tagsB[1] || 'N' }]
  );
  fromM.matchType = psMatchType(
    [{ id: fromM.teamA[0], tag: fromM.tagsA[0] || 'N' }, { id: fromM.teamA[1], tag: fromM.tagsA[1] || 'N' }],
    [{ id: fromM.teamB[0], tag: fromM.tagsB[0] || 'N' }, { id: fromM.teamB[1], tag: fromM.tagsB[1] || 'N' }]
  );

  saveAll(); renderAll(); closeModal();
  toast(`${playerName(inId)} (Court ${fromM.courtNum}) ↔ ${playerName(outId)} (Court ${m.courtNum}) swapped.${duoNote}`, duoNote ? 'warning' : 'success');
}

// Bring a player in from the Winners or Losers accumulation block. The
// outgoing on-court player takes the incoming player's exact spot in that
// same block (re-tagged to match the block they're now sitting in — a
// block is uniformly W or uniformly L by definition), so block order and
// size stay consistent for the next flush to the queue.
function psdoSwitchPlayerFromBlock(courtId, team, slot, blockType, blockIdx) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;
  if (m.winner || hasMatchStarted(m)) {
    toast('Match already decided — cannot switch players.', 'warning');
    return;
  }
  const block = blockType === 'w' ? ps.wBlock : ps.lBlock;
  if (!block || blockIdx < 0 || blockIdx >= block.length) {
    toast('That player is no longer waiting in the block.', 'warning');
    closeModal();
    return;
  }

  if (!Array.isArray(m.tagsA)) m.tagsA = ['N', 'N'];
  if (!Array.isArray(m.tagsB)) m.tagsB = ['N', 'N'];

  const outId  = team === 'A' ? m.teamA[slot] : m.teamB[slot];
  const outTag = psTag(m, team, slot);
  const inEntry = block[blockIdx];

  if (inEntry.id === outId) {
    toast('That player is already on court.', 'warning');
    closeModal();
    return;
  }

  const duoNote = psDuoBreakNote(m, team, slot);
  psPushHistory();

  // Place the incoming player on court, carrying the block's tag with them
  if (team === 'A') { m.teamA[slot] = inEntry.id; m.tagsA[slot] = inEntry.tag || (blockType === 'w' ? 'W' : 'L'); }
  else              { m.teamB[slot] = inEntry.id; m.tagsB[slot] = inEntry.tag || (blockType === 'w' ? 'W' : 'L'); }

  // Outgoing player takes the incoming player's exact spot in the same block,
  // re-tagged to match (blocks are uniformly W or uniformly L).
  block.splice(blockIdx, 1, { id: outId, tag: blockType === 'w' ? 'W' : 'L' });

  m.matchType = psMatchType(
    [{ id: m.teamA[0], tag: m.tagsA[0] || 'N' }, { id: m.teamA[1], tag: m.tagsA[1] || 'N' }],
    [{ id: m.teamB[0], tag: m.tagsB[0] || 'N' }, { id: m.teamB[1], tag: m.tagsB[1] || 'N' }]
  );

  saveAll(); renderAll(); closeModal();
  toast(`${playerName(inEntry.id)} steps in — ${playerName(outId)} moves to the ${blockType === 'w' ? 'Winners' : 'Losers'} block.${duoNote}`, duoNote ? 'warning' : 'success');
}

// Execute the Switch Partner swap: two on-court players swap teams, both stay on court.
// swapSpec is "aSlot-bSlot" e.g. "0-1" meaning teamA[0] swaps with teamB[1].
function psdoPartnerSwap(courtId, swapSpec) {
  const ps = state.paddleStack;
  if (!ps) return;
  const m = ps.courts.find(c => c.id === courtId);
  if (!m) return;

  const parts = (swapSpec || '').split('-').map(Number);
  if (parts.length !== 2 || parts.some(isNaN)) return;
  const [aSlot, bSlot] = parts;
  if (aSlot < 0 || aSlot > 1 || bSlot < 0 || bSlot > 1) return;

  // Ensure tagsA/tagsB arrays exist (older saved sessions may lack them)
  if (!Array.isArray(m.tagsA)) m.tagsA = ['N', 'N'];
  if (!Array.isArray(m.tagsB)) m.tagsB = ['N', 'N'];

  const aId  = m.teamA[aSlot],  aTag  = m.tagsA[aSlot] || 'N';
  const bId  = m.teamB[bSlot],  bTag  = m.tagsB[bSlot] || 'N';

  // Guard: no-op self-swap (shouldn't happen in practice)
  if (aId === bId) {
    toast('Same player on both sides — no swap needed.', 'warning');
    closeModal();
    return;
  }

  const duoNote = psDuoBreakNote(m, 'A', aSlot) || psDuoBreakNote(m, 'B', bSlot);
  psPushHistory();

  // Swap
  m.teamA[aSlot] = bId;  m.tagsA[aSlot] = bTag;
  m.teamB[bSlot] = aId;  m.tagsB[bSlot] = aTag;

  // Recompute match type
  m.matchType = psMatchType(
    [{ id: m.teamA[0], tag: m.tagsA[0] || 'N' }, { id: m.teamA[1], tag: m.tagsA[1] || 'N' }],
    [{ id: m.teamB[0], tag: m.tagsB[0] || 'N' }, { id: m.teamB[1], tag: m.tagsB[1] || 'N' }]
  );

  saveAll(); renderAll(); closeModal();
  toast(`Partners swapped — ${playerName(bId)} & ${playerName(aId)} switched sides.${duoNote}`, duoNote ? 'warning' : 'success');
}
